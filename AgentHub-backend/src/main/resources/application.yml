spring:
  application:
    name: agenthub-server
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus-0112}
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000
    mcp:
      client:
        enabled: false
        stdio:
          servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api

search-api:
  api-key: ${SEARCH_API_KEY:}

springdoc:
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.agenthub.server.controller

knife4j:
  enable: ${KNIFE4J_ENABLED:false}
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: info

agenthub:
  cors:
    allowed-origins: ${AGENTHUB_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  security:
    api-token: ${AGENTHUB_API_TOKEN:}
    rate-limit:
      requests-per-minute: ${AGENTHUB_AI_RATE_LIMIT_PER_MINUTE:60}
